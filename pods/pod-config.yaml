apiVersion: v1
kind: Pod
metadata:
  name: configMap-pod
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
    env:
    - name: course
      valueFrom:
        configMapKeyRef:
          name: demo
          key: course

    - name: trainer
      valueFrom:
        configMapKeyRef:
          name: demo
          key : trainer

