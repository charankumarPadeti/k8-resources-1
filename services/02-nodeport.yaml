apiVersion: v1
kind: Pod
metadata:
  name: nginx-nodepod
  labels:
    name: demo
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: NodePort
  selector:
    name: demo
  ports:
    - port: 80
      targetPort: 80
